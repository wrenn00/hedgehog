<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hedgehog Stack</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    color: #2C2C2C;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  /* 점수 영역 */
  #score-area {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    margin-bottom: 16px;
  }

  #score {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: -2px;
    color: #2C2C2C;
    line-height: 1;
  }

  #best-score {
    font-size: 13px;
    color: #AAAAAA;
    letter-spacing: 0.5px;
  }

  /* 캔버스 래퍼 */
  #canvas-wrapper {
    position: relative;
    width: 400px;
    height: 600px;
    border: 1px solid #EEEEEE;
    background: #FAFAFA;
    cursor: crosshair;
  }

  /* Matter.js 가 삽입할 canvas */
  #canvas-wrapper canvas {
    display: block;
    width: 100% !important;
    height: 100% !important;
  }

  /* 모바일 반응형 */
  @media (max-width: 480px) {
    #canvas-wrapper {
      width: 100vw;
      height: calc(100vw * 1.5);
      border-left: none;
      border-right: none;
    }
    #score { font-size: 36px; }
  }
</style>
</head>
<body>

<div id="score-area">
  <div id="score">0</div>
  <div id="best-score">최고 0</div>
</div>

<div id="canvas-wrapper" id="game-canvas"></div>

<script>
  const { Engine, Render, Runner, World, Bodies, Events, Body } = Matter;

  // ── 캔버스 크기 ───────────────────────────────────────────
  const wrapper  = document.getElementById('canvas-wrapper');
  const W = 400;
  const H = 600;
  const WALL_T = 50;   // 벽 두께

  // ── 엔진 & 렌더러 ─────────────────────────────────────────
  const engine = Engine.create({ gravity: { y: 1 } });
  const world  = engine.world;

  const render = Render.create({
    element: wrapper,
    engine:  engine,
    options: {
      width:      W,
      height:     H,
      background: '#FAFAFA',
      wireframes: false,
    }
  });

  // ── 정적 경계: 바닥 + 좌우 벽 ────────────────────────────
  const ground = Bodies.rectangle(W / 2, H + WALL_T / 2, W, WALL_T, {
    isStatic: true,
    label: 'ground',
    render: { fillStyle: 'transparent' }
  });
  const wallL = Bodies.rectangle(-WALL_T / 2, H / 2, WALL_T, H, {
    isStatic: true,
    label: 'wall-left',
    render: { fillStyle: 'transparent' }
  });
  const wallR = Bodies.rectangle(W + WALL_T / 2, H / 2, WALL_T, H, {
    isStatic: true,
    label: 'wall-right',
    render: { fillStyle: 'transparent' }
  });

  World.add(world, [ground, wallL, wallR]);

  // ── 런너 & 렌더 시작 ──────────────────────────────────────
  Render.run(render);
  const runner = Runner.create();
  Runner.run(runner, engine);

  // ── 클릭 시 원 드롭 (테스트용) ───────────────────────────
  wrapper.addEventListener('click', (e) => {
    const rect = wrapper.getBoundingClientRect();
    // 실제 픽셀 → 물리 좌표 변환 (반응형 대응)
    const scaleX = W / rect.width;
    const scaleY = H / rect.height;
    const x = (e.clientX - rect.left) * scaleX;
    const y = (e.clientY - rect.top)  * scaleY;

    const circle = Bodies.circle(x, y, 30, {
      restitution: 0.3,   // 탄성
      friction:    0.5,
      density:     0.002,
      render: {
        fillStyle:   '#E8B4A0',
        strokeStyle: 'none',
        lineWidth:   0,
      }
    });
    World.add(world, circle);
  });

  // ── 점수 (현재는 누적 드롭 횟수) ─────────────────────────
  let score = 0;
  let best  = parseInt(localStorage.getItem('hs_best') || '0');
  const scoreEl = document.getElementById('score');
  const bestEl  = document.getElementById('best-score');
  bestEl.textContent = `최고 ${best}`;

  wrapper.addEventListener('click', () => {
    score++;
    scoreEl.textContent = score;
    if (score > best) {
      best = score;
      localStorage.setItem('hs_best', best);
      bestEl.textContent = `최고 ${best}`;
    }
  });

  // ── 반응형: Matter render 크기 조정 ──────────────────────
  function resize() {
    const w = wrapper.clientWidth;
    const h = wrapper.clientHeight;
    render.canvas.style.width  = w + 'px';
    render.canvas.style.height = h + 'px';
  }
  window.addEventListener('resize', resize);
  resize();
</script>
</body>
</html>
