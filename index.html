<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hedgehog Pile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    color: #2C2C2C;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  #title {
    font-size: 14px;
    color: #888888;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  #canvas-wrapper {
    position: relative;
    width: 500px;
    height: 700px;
    flex-shrink: 0;
  }

  /* Matter.js 가 삽입하는 canvas */
  #canvas-wrapper canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    border: 1px solid #F0F0F0;
  }

  #counter {
    position: absolute;
    right: 10px;
    bottom: 10px;
    font-size: 12px;
    color: #BBBBBB;
    letter-spacing: 0.3px;
    pointer-events: none;
    z-index: 10;
  }

  @media (max-width: 540px) {
    #canvas-wrapper { width: 100vw; height: calc(100vw * 1.4); }
  }
  @media (max-height: 800px) {
    #canvas-wrapper {
      width: min(500px, 90vw);
      height: min(700px, calc(min(500px, 90vw) * 1.4));
    }
    #title { margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="title">Hedgehog Pile</div>
<div id="canvas-wrapper">
  <div id="counter">쌓은 개수: 0</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════════════════
const W      = 500;
const H      = 700;
const WALL_T = 60;
const HOG_R  = 40;
const WALL_H = 20000;

// 대기 고슴도치 위치 (world 좌표)
const IDLE_X  = W / 2;
const IDLE_Y  = 65;
const IDLE_AMP   = 5;      // 둥둥 진폭 (px)
const IDLE_PERIOD = 2000;  // 둥둥 주기 (ms)

// 안정 판정
const STABLE_SPD = 0.1;
const STABLE_MS  = 500;

// ═══════════════════════════════════════════════════════════
// Matter.js 셋업
// ═══════════════════════════════════════════════════════════
const { Engine, Render, Runner, World, Bodies, Body, Events } = Matter;

const wrapper   = document.getElementById('canvas-wrapper');
const counterEl = document.getElementById('counter');

const engine = Engine.create({ gravity: { y: 1 } });
const world  = engine.world;

const render = Render.create({
  element: wrapper,
  engine:  engine,
  options: {
    width:      W,
    height:     H,
    background: '#FFFFFF',
    wireframes: false,
  }
});

World.add(world, [
  // 바닥
  Bodies.rectangle(W/2, H + WALL_T/2, W + WALL_T*2, WALL_T, {
    isStatic: true, label: 'ground',
    render: { fillStyle: 'transparent' },
  }),
  // 좌벽
  Bodies.rectangle(-WALL_T/2, H/2 - WALL_H/2, WALL_T, WALL_H, {
    isStatic: true, label: 'wall-l',
    render: { fillStyle: 'transparent' },
  }),
  // 우벽
  Bodies.rectangle(W + WALL_T/2, H/2 - WALL_H/2, WALL_T, WALL_H, {
    isStatic: true, label: 'wall-r',
    render: { fillStyle: 'transparent' },
  }),
]);

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ═══════════════════════════════════════════════════════════
// 이미지 로드
// ═══════════════════════════════════════════════════════════
const hogImage = new Image();
hogImage.src = 'wh.png';
hogImage.onerror = () => console.warn('wh.png 로드 실패 — 폴백으로 원 사용');

// ═══════════════════════════════════════════════════════════
// 좌표 변환 유틸
// world 좌표 ↔ canvas 픽셀 (반응형 대응)
// ═══════════════════════════════════════════════════════════
function clientToWorld(clientX, clientY) {
  const rect  = render.canvas.getBoundingClientRect();
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  return {
    x: (clientX - rect.left) * scaleX,
    y: (clientY - rect.top)  * scaleY,
  };
}

// ═══════════════════════════════════════════════════════════
// 고슴도치 그리기 (world 좌표)
// ═══════════════════════════════════════════════════════════
function drawHedgehog(ctx, x, y, angle, r, alpha = 1, scale = 1) {
  ctx.save();
  ctx.globalAlpha = alpha;
  ctx.translate(x, y);
  ctx.rotate(angle);
  ctx.scale(scale, scale);

  if (hogImage.complete && hogImage.naturalWidth > 0) {
    ctx.drawImage(hogImage, -r, -r, r * 2, r * 2);
  } else {
    // 폴백: 살구색 원
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#E8B4A0';
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 떨어진 고슴도치 목록
// ═══════════════════════════════════════════════════════════
const hedgehogs = []; // { body, stableTimer, counted }
let stableCount = 0;

// ═══════════════════════════════════════════════════════════
// 드래그 상태
// ═══════════════════════════════════════════════════════════
let isDragging  = false;   // 현재 드래그 중
let isDropped   = false;   // 방금 드롭함 (새 대기 고슴도치 재등장 대기)
let dragX = IDLE_X;        // 드래그 중 고슴도치 world x
let dragY = IDLE_Y;        // 드래그 중 고슴도치 world y
let idleAlpha  = 1;        // 대기 고슴도치 투명도 (재등장 fade)
let idleTime   = 0;        // 대기 고슴도치 둥둥 시간
let lastTs     = 0;

// 현재 대기 고슴도치 y (둥둥 효과)
function idleCurrentY() {
  return IDLE_Y + Math.sin((idleTime / IDLE_PERIOD) * Math.PI * 2) * IDLE_AMP;
}

// ═══════════════════════════════════════════════════════════
// 충격파 효과
// ═══════════════════════════════════════════════════════════
const pulses = []; // { x, y, startTs, maxR }
const PULSE_MS   = 300;
const PULSE_MAXR = 60;

function spawnPulse(x, y) {
  pulses.push({ x, y, startTs: performance.now() });
}

function drawPulses(ctx, now) {
  for (let i = pulses.length - 1; i >= 0; i--) {
    const p = pulses[i];
    const t = (now - p.startTs) / PULSE_MS;
    if (t >= 1) { pulses.splice(i, 1); continue; }

    const radius = t * PULSE_MAXR;
    const alpha  = (1 - t) * 0.6;

    ctx.save();
    ctx.beginPath();
    ctx.arc(p.x, p.y, radius, 0, Math.PI * 2);
    ctx.strokeStyle = '#E8B4A0';
    ctx.lineWidth   = 1;
    ctx.globalAlpha = alpha;
    ctx.stroke();
    ctx.restore();
  }
}

// ═══════════════════════════════════════════════════════════
// 드롭 → Body 생성
// ═══════════════════════════════════════════════════════════
function dropHedgehog(wx, wy) {
  const angle    = (Math.random() - 0.5) * 0.6;   // -0.3 ~ 0.3 rad
  const angVel   = (Math.random() - 0.5) * 0.1;   // -0.05 ~ 0.05

  const body = Bodies.circle(wx, wy, HOG_R, {
    restitution: 0.4,
    friction:    0.6,
    density:     0.002,
    label: 'hedgehog',
    render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 },
    angle: angle,
  });

  // 초기 회전 속도와 아래 방향 속도
  Body.setAngularVelocity(body, angVel);
  Body.setVelocity(body, { x: 0, y: 1 });

  World.add(world, body);
  hedgehogs.push({ body, stableTimer: 0, counted: false });

  isDragging = false;
  isDropped  = true;

  // 0.5초 후 대기 고슴도치 재등장 (fade in)
  setTimeout(() => {
    dragX      = IDLE_X;
    dragY      = idleCurrentY();
    idleAlpha  = 0;
    isDropped  = false;

    // fade in 200ms
    const fadeStart = performance.now();
    function fadeIn(ts) {
      const t = Math.min((ts - fadeStart) / 200, 1);
      idleAlpha = t;
      if (t < 1) requestAnimationFrame(fadeIn);
    }
    requestAnimationFrame(fadeIn);
  }, 500);
}

// ═══════════════════════════════════════════════════════════
// Hit test: 포인터가 대기 고슴도치 위인지 (world 좌표)
// ═══════════════════════════════════════════════════════════
function hitIdle(wx, wy) {
  const cy = !isDragging && !isDropped ? idleCurrentY() : dragY;
  const dx = wx - (isDragging ? dragX : IDLE_X);
  const dy = wy - cy;
  return Math.hypot(dx, dy) <= HOG_R * 1.3;  // 약간 넉넉하게
}

// ═══════════════════════════════════════════════════════════
// 입력 이벤트
// ═══════════════════════════════════════════════════════════
const canvas = render.canvas;

// ── 마우스 ────────────────────────────────────────────────
canvas.addEventListener('mousedown', e => {
  if (isDropped) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x;
    dragY = y;
    canvas.style.cursor = 'grabbing';
  }
});

window.addEventListener('mousemove', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dragX = x;
  dragY = y;
});

window.addEventListener('mouseup', e => {
  if (!isDragging) return;
  const { x, y } = clientToWorld(e.clientX, e.clientY);
  dropHedgehog(x, y);
  canvas.style.cursor = 'default';
});

// ── 터치 ──────────────────────────────────────────────────
canvas.addEventListener('touchstart', e => {
  if (isDropped) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  if (hitIdle(x, y)) {
    isDragging = true;
    dragX = x;
    dragY = y;
  }
}, { passive: false });

window.addEventListener('touchmove', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dragX = x;
  dragY = y;
}, { passive: false });

window.addEventListener('touchend', e => {
  if (!isDragging) return;
  e.preventDefault();
  const t = e.changedTouches[0];
  const { x, y } = clientToWorld(t.clientX, t.clientY);
  dropHedgehog(x, y);
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// 충돌 감지 → 충격파 + 작은 흔들림
// ═══════════════════════════════════════════════════════════
// 방금 드롭된 body 추적 (충돌 감지 대상)
let latestBody = null;

Events.on(engine, 'collisionStart', event => {
  const pairs = event.pairs;
  for (const pair of pairs) {
    const { bodyA, bodyB } = pair;

    // 새로 드롭된 hedgehog 관련 충돌만 처리
    const isLatest =
      bodyA === latestBody || bodyB === latestBody;
    if (!isLatest) continue;

    // 충돌 지점 계산 (두 body 중심의 중간)
    const cx = (bodyA.position.x + bodyB.position.x) / 2;
    const cy = (bodyA.position.y + bodyB.position.y) / 2;
    spawnPulse(cx, cy);

    // 상대방 body에 미세한 랜덤 힘 적용
    const other = bodyA === latestBody ? bodyB : bodyA;
    if (!other.isStatic) {
      const fx = (Math.random() - 0.5) * 0.002;
      const fy = (Math.random() - 0.5) * 0.001;
      Body.applyForce(other, other.position, { x: fx, y: fy });
    }
  }
});

// dropHedgehog에서 body 생성 후 latestBody 갱신 (수정 버전)
const _originalDrop = dropHedgehog;
// 아래 afterRender 루프에서 가장 최근 body를 latestBody로 업데이트

// ═══════════════════════════════════════════════════════════
// afterRender 루프
// ═══════════════════════════════════════════════════════════
Events.on(render, 'afterRender', () => {
  const ctx = render.context;
  const now = performance.now();

  // dt 계산 (둥둥 타이머)
  const dt  = lastTs > 0 ? Math.min(now - lastTs, 50) : 0;
  lastTs    = now;
  if (!isDropped && !isDragging) idleTime += dt;

  // 1. 안정도 체크 → 카운터
  for (const entry of hedgehogs) {
    if (entry.counted) continue;
    const spd = Math.hypot(entry.body.velocity.x, entry.body.velocity.y);
    const asp = Math.abs(entry.body.angularVelocity);
    if (spd < STABLE_SPD && asp < STABLE_SPD * 0.5) {
      entry.stableTimer += dt;
      if (entry.stableTimer >= STABLE_MS) {
        entry.counted = true;
        stableCount++;
        counterEl.textContent = `쌓은 개수: ${stableCount}`;
      }
    } else {
      entry.stableTimer = 0;
    }
  }

  // latestBody 갱신
  if (hedgehogs.length > 0) {
    latestBody = hedgehogs[hedgehogs.length - 1].body;
  }

  // 2. 떨어진 고슴도치 그리기
  for (const entry of hedgehogs) {
    const b = entry.body;
    drawHedgehog(ctx, b.position.x, b.position.y, b.angle, HOG_R);
  }

  // 3. 충격파
  drawPulses(ctx, now);

  // 4. 대기 고슴도치 (드래그 중 또는 idle)
  if (!isDropped) {
    const drawX  = isDragging ? dragX : IDLE_X;
    const drawY  = isDragging ? dragY : idleCurrentY();
    const scale  = isDragging ? 1.05 : 1.0;
    const angle  = 0;

    // 드래그 중 옅은 그림자
    if (isDragging) {
      ctx.save();
      ctx.shadowColor   = 'rgba(0,0,0,0.12)';
      ctx.shadowBlur    = 16;
      ctx.shadowOffsetY = 6;
      drawHedgehog(ctx, drawX, drawY, angle, HOG_R, idleAlpha, scale);
      ctx.restore();
    } else {
      drawHedgehog(ctx, drawX, drawY, angle, HOG_R, idleAlpha, scale);
    }

    // 드래그 커서 힌트 (idle 상태일 때 테두리 원)
    if (!isDragging && idleAlpha > 0.5) {
      ctx.save();
      ctx.beginPath();
      ctx.arc(IDLE_X, idleCurrentY(), HOG_R + 4, 0, Math.PI * 2);
      ctx.strokeStyle = 'rgba(232,180,160,0.4)';
      ctx.lineWidth   = 1.5;
      ctx.setLineDash([4, 6]);
      ctx.globalAlpha = idleAlpha;
      ctx.stroke();
      ctx.setLineDash([]);
      ctx.restore();
    }
  }
});
</script>
</body>
</html>
