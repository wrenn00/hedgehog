<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Hedgehog Pile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/matter-js/0.19.0/matter.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: #FFFFFF;
    color: #2C2C2C;
    width: 100vw;
    height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    user-select: none;
    -webkit-user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  /* 제목 */
  #title {
    font-size: 14px;
    color: #888888;
    letter-spacing: 0.5px;
    margin-bottom: 10px;
  }

  /* 캔버스 래퍼 */
  #canvas-wrapper {
    position: relative;
    width: 500px;
    height: 700px;
    flex-shrink: 0;
  }

  /* Matter.js 가 삽입하는 canvas */
  #canvas-wrapper canvas {
    display: block;
    position: absolute;
    top: 0; left: 0;
    width: 100% !important;
    height: 100% !important;
    border: 1px solid #F0F0F0;
    cursor: crosshair;
  }

  /* 카운터 — canvas 우측 하단에 겹쳐서 표시 */
  #counter {
    position: absolute;
    right: 10px;
    bottom: 10px;
    font-size: 12px;
    color: #BBBBBB;
    letter-spacing: 0.3px;
    pointer-events: none;
    z-index: 10;
  }

  /* 반응형 */
  @media (max-width: 540px) {
    #canvas-wrapper {
      width: 100vw;
      height: calc(100vw * 1.4);
    }
  }
  @media (max-height: 800px) {
    #canvas-wrapper {
      width: min(500px, 90vw);
      height: min(700px, calc(min(500px, 90vw) * 1.4));
    }
    #title { margin-bottom: 6px; }
  }
</style>
</head>
<body>

<div id="title">Hedgehog Pile</div>

<div id="canvas-wrapper">
  <div id="counter">쌓은 개수: 0</div>
</div>

<script>
// ═══════════════════════════════════════════════════════════
// 상수
// ═══════════════════════════════════════════════════════════
const W      = 500;
const H      = 700;
const WALL_T = 60;
const HOG_R  = 40;
const WALL_H = 20000;   // 충분히 높게 (타워 상승 대응)

// ═══════════════════════════════════════════════════════════
// Matter.js 셋업
// ═══════════════════════════════════════════════════════════
const { Engine, Render, Runner, World, Bodies, Events } = Matter;

const wrapper = document.getElementById('canvas-wrapper');
const counterEl = document.getElementById('counter');

const engine = Engine.create({ gravity: { y: 1 } });
const world  = engine.world;

const render = Render.create({
  element: wrapper,
  engine:  engine,
  options: {
    width:      W,
    height:     H,
    background: '#FFFFFF',
    wireframes: false,
  }
});

// ── 경계 ──────────────────────────────────────────────────
// 바닥
const ground = Bodies.rectangle(W / 2, H + WALL_T / 2, W + WALL_T * 2, WALL_T, {
  isStatic: true,
  label: 'ground',
  render: { fillStyle: 'transparent' },
});
// 좌벽
const wallL = Bodies.rectangle(-WALL_T / 2, H / 2 - WALL_H / 2, WALL_T, WALL_H, {
  isStatic: true,
  label: 'wall-l',
  render: { fillStyle: 'transparent' },
});
// 우벽
const wallR = Bodies.rectangle(W + WALL_T / 2, H / 2 - WALL_H / 2, WALL_T, WALL_H, {
  isStatic: true,
  label: 'wall-r',
  render: { fillStyle: 'transparent' },
});

World.add(world, [ground, wallL, wallR]);

Render.run(render);
const runner = Runner.create();
Runner.run(runner, engine);

// ═══════════════════════════════════════════════════════════
// wh.png 이미지 로드
// ═══════════════════════════════════════════════════════════
const hogImage = new Image();
hogImage.src = 'wh.png';

let imageReady = false;
hogImage.onload  = () => { imageReady = true; };
hogImage.onerror = () => { console.warn('wh.png 로드 실패 — 폴백으로 원 사용'); };

// ═══════════════════════════════════════════════════════════
// 고슴도치 그리기
// ═══════════════════════════════════════════════════════════
//  ctx   : 2D context
//  body  : Matter.js Circle body
//  image : HTMLImageElement (wh.png)
//  r     : 반지름 (px, world 좌표 기준)
function drawHedgehog(ctx, body, image, r) {
  const { x, y } = body.position;
  const angle     = body.angle;

  ctx.save();
  ctx.translate(x, y);
  ctx.rotate(angle);

  if(image && image.complete && image.naturalWidth > 0) {
    // wh.png 를 body 중심으로 r*2 x r*2 크기로 그리기
    ctx.drawImage(image, -r, -r, r * 2, r * 2);
  } else {
    // 이미지 로드 전 폴백 — 살구색 원
    ctx.beginPath();
    ctx.arc(0, 0, r, 0, Math.PI * 2);
    ctx.fillStyle = '#E8B4A0';
    ctx.fill();
  }

  ctx.restore();
}

// ═══════════════════════════════════════════════════════════
// 고슴도치 Body 목록
// ═══════════════════════════════════════════════════════════
const hedgehogs = [];
let count = 0;

// ═══════════════════════════════════════════════════════════
// 클릭/터치 → 고슴도치 추가
// ═══════════════════════════════════════════════════════════
function addHedgehog(clientX, clientY) {
  const rect   = render.canvas.getBoundingClientRect();
  // 화면 픽셀 → world 좌표 변환 (반응형 대응)
  const scaleX = W / rect.width;
  const scaleY = H / rect.height;
  const wx = (clientX - rect.left) * scaleX;
  const wy = (clientY - rect.top)  * scaleY;

  const body = Bodies.circle(wx, wy, HOG_R, {
    restitution: 0.3,
    friction:    0.6,
    density:     0.002,
    label: 'hedgehog',
    // Matter 기본 렌더는 투명 — afterRender에서 직접 그림
    render: { fillStyle: 'transparent', strokeStyle: 'transparent', lineWidth: 0 },
  });

  World.add(world, body);
  hedgehogs.push(body);
  count++;
  counterEl.textContent = `쌓은 개수: ${count}`;
}

render.canvas.addEventListener('click', e => {
  addHedgehog(e.clientX, e.clientY);
});

render.canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const t = e.changedTouches[0];
  addHedgehog(t.clientX, t.clientY);
}, { passive: false });

// ═══════════════════════════════════════════════════════════
// afterRender — 고슴도치 이미지 오버레이
// ═══════════════════════════════════════════════════════════
Events.on(render, 'afterRender', () => {
  const ctx = render.context;

  for(const body of hedgehogs) {
    drawHedgehog(ctx, body, hogImage, HOG_R);
  }
});
</script>
</body>
</html>
